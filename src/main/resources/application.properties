# =============================================================
# Application Config
# =============================================================
quarkus.application.name=quarkus-order-kafka
quarkus.http.port=8080

# =============================================================
# PostgreSQL Datasource
# =============================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=pass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/orderdb

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# =============================================================
# Kafka Bootstrap
# =============================================================
kafka.bootstrap.servers=localhost:9092

# =============================================================
# Kafka Serializers / Deserializers
# =============================================================
mp.messaging.connector.smallrye-kafka.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.connector.smallrye-kafka.value.deserializer=com.example.order.deserializer.OrderEventDeserializer

# =============================================================
# Producer Channels
# =============================================================

# Channel: orders-out -> topic: orders
mp.messaging.outgoing.orders-out.connector=smallrye-kafka
mp.messaging.outgoing.orders-out.topic=orders
mp.messaging.outgoing.orders-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer

# Channel: orders-processed-out -> topic: orders-processed
mp.messaging.outgoing.orders-processed-out.connector=smallrye-kafka
mp.messaging.outgoing.orders-processed-out.topic=orders-processed
mp.messaging.outgoing.orders-processed-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer

# Channel: orders-dlq-out -> topic: orders-dlq
mp.messaging.outgoing.orders-dlq-out.connector=smallrye-kafka
mp.messaging.outgoing.orders-dlq-out.topic=orders-dlq
mp.messaging.outgoing.orders-dlq-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer

# =============================================================
# Consumer Channels
# =============================================================

mp.messaging.incoming.orders-in.dead-letter-queue.topic=orders-dlq
mp.messaging.incoming.orders-in.dead-letter-queue.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Channel: orders-in <- topic: orders
mp.messaging.incoming.orders-in.connector=smallrye-kafka
mp.messaging.incoming.orders-in.topic=orders
mp.messaging.incoming.orders-in.group.id=order-processor-group
mp.messaging.incoming.orders-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.orders-in.auto.offset.reset=earliest
mp.messaging.incoming.orders-in.failure-strategy=fail

# =============================================================
# Logging
# =============================================================
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."com.example".level=DEBUG
